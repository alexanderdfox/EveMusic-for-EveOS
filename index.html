<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>EveMusic Desktop Player</title>
	<style>
		:root {
			--bg-color: #0b0c10;
			--panel-color: #1f2833;
			--accent-cyan: #66fcf1;
			--accent-dim: #45a29e;
			--text-color: #c5c6c7;
		}

		body {
			background-color: var(--bg-color);
			background-image: 
				linear-gradient(var(--theme-grid, rgba(102, 252, 241, 0.03)) 1px, transparent 1px),
				linear-gradient(90deg, var(--theme-grid, rgba(102, 252, 241, 0.03)) 1px, transparent 1px),
				radial-gradient(circle at 50% 50%, var(--panel-color) 0%, var(--bg-color) 100%);
			background-size: 40px 40px, 40px 40px, 100% 100%;
			color: var(--text-color);
			font-family: 'Courier New', Courier, monospace;
			min-height: 100vh;
			margin: 0;
			overflow: hidden;
			user-select: none;
			transition: background 0.3s ease;
		}

		/* Draggable Window Container */
		.winamp-window {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 550px;
			height: 550px;
			cursor: move;
			z-index: 100;
		}

		.spinner-player {
			position: relative;
			width: 100%;
			height: 100%;
			filter: drop-shadow(0 0 25px var(--theme-glow, rgba(102, 252, 241, 0.3)));
		}

		/* SVG Shape Wrapper */
		.spinner-hardware {
			position: absolute;
			width: 100%;
			height: 100%;
			transform-origin: center center;
			transition: transform 0.1s linear;
			pointer-events: none;
		}

		.spinner-shell {
			fill: var(--panel-color);
			stroke: var(--accent-cyan);
			stroke-width: 4;
			transition: stroke 0.3s ease;
		}

		.bearing-weight {
			fill: #000;
			stroke: var(--accent-dim);
			stroke-width: 2;
			transition: stroke 0.3s ease;
		}

		.spinning {
			animation: spin 3s linear infinite;
		}

		@keyframes spin {
			from { transform: rotate(0deg); }
			to { transform: rotate(360deg); }
		}

		/* Center Hub Screen */
		.center-bearing {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 145px;
			height: 145px;
			background: #000;
			border: 3px double var(--accent-cyan);
			border-radius: 50%;
			z-index: 10;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			text-align: center;
			padding: 8px;
			box-sizing: border-box;
			box-shadow: inset 0 0 15px var(--theme-glow, rgba(102, 252, 241, 0.4));
			cursor: default;
			transition: border-color 0.3s ease;
		}

		.title-display {
			font-size: 9px;
			color: var(--accent-cyan);
			white-space: nowrap;
			overflow: hidden;
			width: 120px;
			text-overflow: ellipsis;
			margin-bottom: 3px;
			transition: color 0.3s ease;
			font-weight: bold;
		}

		.time-display {
			font-size: 22px;
			font-weight: bold;
			color: #fff;
			text-shadow: 0 0 5px var(--accent-cyan);
			font-family: monospace;
			letter-spacing: 1px;
		}

		.status-display {
			font-size: 8px;
			color: var(--accent-dim);
			text-transform: uppercase;
			margin-top: 2px;
			letter-spacing: 1px;
			transition: color 0.3s ease;
		}

		/* Interactive UI Nodes */
		.prong-ui {
			position: absolute;
			width: 120px;
			height: 120px;
			border-radius: 50%;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			z-index: 5;
			transform: translate(-50%, -50%);
			cursor: default;
		}

		.prong-top { top: 110px; left: 50%; }
		.prong-bottom-right { top: 358px; left: 418px; }
		.prong-bottom-left { top: 358px; left: 132px; }

		/* UI Styling Components */
		.btn {
			background: #0b0c10;
			border: 1px solid var(--accent-dim);
			color: var(--accent-cyan);
			padding: 3px 5px;
			margin: 1px;
			cursor: pointer;
			font-size: 8px;
			border-radius: 2px;
			font-family: monospace;
			transition: all 0.2s ease;
		}

		.btn:hover {
			background: var(--accent-cyan);
			color: #000;
			box-shadow: 0 0 8px var(--accent-cyan);
		}

		.net-input {
			background: #111;
			border: 1px solid var(--accent-dim);
			color: #fff;
			font-size: 8px;
			width: 90px;
			padding: 2px;
			text-align: center;
			font-family: monospace;
			margin-top: 2px;
			transition: border-color 0.3s ease;
		}
		
		.net-input:focus { outline: none; border-color: var(--accent-cyan); }

		.slider-container {
			display: flex;
			flex-direction: column;
			align-items: center;
			font-size: 8px;
			color: var(--accent-cyan);
		}

		input[type="range"] {
			-webkit-appearance: none;
			width: 65px;
			background: #111;
			height: 3px;
			outline: none;
			border: 1px solid #333;
		}

		input[type="range"]::-webkit-slider-thumb {
			-webkit-appearance: none;
			appearance: none;
			width: 8px;
			height: 12px;
			background: var(--accent-cyan);
			cursor: pointer;
		}

		#file-input { display: none; }
		.load-btn { margin-top: 4px; font-size: 8px; padding: 2px 4px; }

		/* Theme Config Selector Dropdown */
		.theme-selector {
			background: #000;
			border: 1px solid var(--accent-dim);
			color: var(--accent-cyan);
			font-size: 8px;
			font-family: monospace;
			padding: 2px;
			outline: none;
			width: 85px;
			text-align: center;
			margin-top: 3px;
			cursor: pointer;
		}
	</style>
</head>
<body>

	<div class="winamp-window" id="draggable-player">
		<div class="spinner-player">
			
			<svg class="spinner-hardware" id="spinner-mesh" viewBox="0 0 550 550">
				<path class="spinner-shell" d="
					M 275,45 
					A 65,65 0 0,1 330,110
					Q 350,210 435,260
					A 65,65 0 0,1 418,358
					Q 315,340 275,410
					A 65,65 0 0,1 132,358
					Q 195,340 115,260
					A 65,65 0 0,1 220,110
					Q 200,210 275,45 Z
				"/>
				<circle class="bearing-weight" cx="275" cy="110" r="40" />
				<circle class="bearing-weight" cx="418" cy="358" r="40" />
				<circle class="bearing-weight" cx="132" cy="358" r="40" />
			</svg>

			<div class="center-bearing" onmousedown="event.stopPropagation()">
				<div class="title-display" id="track-title">EVEMUSIC PLAYER</div>
				<div class="time-display" id="time-count">00:00</div>
				<div class="status-display" id="status-text">Stopped</div>
				<button class="btn load-btn" onclick="document.getElementById('file-input').click()">LOAD LOCAL</button>
			</div>

			<div class="prong-ui prong-top" onmousedown="event.stopPropagation()">
				<span style="font-size: 8px; color: var(--accent-dim);">EVEMUSIC STREAMS</span>
				<input type="text" class="net-input" id="net-url-input" placeholder="Paste Audio URL...">
				<div style="display: flex; margin-top: 2px;">
					<button class="btn" id="btn-prev" title="Previous Station">&lt;&lt;</button>
					<button class="btn" id="btn-net-load" style="font-weight: bold;">LOAD</button>
					<button class="btn" id="btn-next" title="Next Station">&gt;&gt;</button>
				</div>
			</div>

			<div class="prong-ui prong-bottom-right" onmousedown="event.stopPropagation()">
				<button class="btn" id="btn-play" style="width: 55px;">PLAY</button>
				<div style="display: flex;">
					<button class="btn" id="btn-pause">PAUSE</button>
					<button class="btn" id="btn-stop">STOP</button>
				</div>
			</div>

			<div class="prong-ui prong-bottom-left" onmousedown="event.stopPropagation()">
				<div class="slider-container">
					<label>VOLUME</label>
					<input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.7">
				</div>
				<select class="theme-selector" id="theme-menu">
					<option value="eveos">EVEOS CYAN</option>
					<option value="matrix">TERMINAL GREEN</option>
					<option value="sunset">CYBER AMBER</option>
					<option value="toxin">RAD TOXIN</option>
				</select>
			</div>

		</div>
	</div>

	<input type="file" id="file-input" accept="audio/*">
	<audio id="audio-engine" crossorigin="anonymous"></audio>

	<script>
		// DRAGGING SYSTEM
		const dragItem = document.getElementById("draggable-player");
		let active = false;
		let currentX, currentY, initialX, initialY;
		let xOffset = 0, yOffset = 0;

		// Load saved coordinates position if they exist
		if(localStorage.getItem('evemusic_posX')) {
			xOffset = parseFloat(localStorage.getItem('evemusic_posX'));
			yOffset = parseFloat(localStorage.getItem('evemusic_posY'));
			dragItem.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
		} else {
			const rect = dragItem.getBoundingClientRect();
			xOffset = rect.left + rect.width / 2 - window.innerWidth / 2;
			yOffset = rect.top + rect.height / 2 - window.innerHeight / 2;
			dragItem.style.transform = `translate(${xOffset}px, ${yOffset}px)`;
		}

		document.addEventListener("mousedown", dragStart);
		document.addEventListener("mouseup", dragEnd);
		document.addEventListener("mousemove", drag);

		function dragStart(e) {
			if (e.target === dragItem || dragItem.contains(e.target)) {
				initialX = e.clientX - xOffset;
				initialY = e.clientY - yOffset;
				active = true;
			}
		}
		function dragEnd() { 
			initialX = currentX; 
			initialY = currentY; 
			active = false; 
			// Save current position vector coordinates persistently
			localStorage.setItem('evemusic_posX', xOffset);
			localStorage.setItem('evemusic_posY', yOffset);
		}
		function drag(e) {
			if (active) {
				e.preventDefault();
				currentX = e.clientX - initialX;
				currentY = e.clientY - initialY;
				xOffset = currentX;
				yOffset = currentY;
				dragItem.style.transform = `translate(${currentX}px, ${currentY}px)`;
			}
		}

		// PERSISTENT THEME DATA PROFILE REGISTRY
		const themes = {
			eveos: { cyan: "#66fcf1", dim: "#45a29e", glow: "rgba(102, 252, 241, 0.4)", grid: "rgba(102, 252, 241, 0.03)" },
			matrix: { cyan: "#39ff14", dim: "#008f11", glow: "rgba(57, 255, 20, 0.4)", grid: "rgba(57, 255, 20, 0.03)" },
			sunset: { cyan: "#ff007f", dim: "#9a004d", glow: "rgba(255, 0, 127, 0.4)", grid: "rgba(255, 0, 127, 0.03)" },
			toxin: { cyan: "#ffb000", dim: "#aa7500", glow: "rgba(255, 176, 0, 0.4)", grid: "rgba(255, 176, 0, 0.03)" }
		};

		const themeMenu = document.getElementById('theme-menu');

		function applyTheme(themeKey) {
			const selected = themes[themeKey] || themes.eveos;
			document.documentElement.style.setProperty('--accent-cyan', selected.cyan);
			document.documentElement.style.setProperty('--accent-dim', selected.dim);
			document.documentElement.style.setProperty('--theme-glow', selected.glow);
			document.documentElement.style.setProperty('--theme-grid', selected.grid);
			
			// Persist choice to local memory storage
			localStorage.setItem('evemusic_saved_theme', themeKey);
			themeMenu.value = themeKey;
		}

		// Initialize saved theme on start
		const cachedTheme = localStorage.getItem('evemusic_saved_theme') || 'eveos';
		applyTheme(cachedTheme);

		themeMenu.addEventListener('change', (e) => {
			applyTheme(e.target.value);
		});

		// AUDIO STREAMS & DATA ENGINE
		const internetPlaylist = [
			{ name: "EVEMUSIC: LOFI CHILL", url: "https://stream.hunter.fm/lofi_high" },
			{ name: "EVEMUSIC: SYNTHWAVE CHILL", url: "https://raggapi.com/synthwave.mp3" }, 
			{ name: "EVEMUSIC: RETRO GAMES", url: "https://stream.retro-radio.com/live.mp3" }
		];
		let currentTrackIndex = 0;

		const audio = document.getElementById('audio-engine');
		const spinnerMesh = document.getElementById('spinner-mesh');
		const fileInput = document.getElementById('file-input');
		const netUrlInput = document.getElementById('net-url-input');
		
		const trackTitle = document.getElementById('track-title');
		const timeCount = document.getElementById('time-count');
		const statusText = document.getElementById('status-text');

		const btnPlay = document.getElementById('btn-play');
		const btnPause = document.getElementById('btn-pause');
		const btnStop = document.getElementById('btn-stop');
		const btnNetLoad = document.getElementById('btn-net-load');
		const volumeSlider = document.getElementById('volume-slider');

		loadInternetTrack(currentTrackIndex);

		function loadInternetTrack(index) {
			const track = internetPlaylist[index];
			netUrlInput.value = track.url;
			trackTitle.textContent = track.name;
		}

		btnNetLoad.addEventListener('click', () => {
			const targetUrl = netUrlInput.value.trim();
			if(targetUrl) {
				audio.src = targetUrl;
				trackTitle.textContent = "CUSTOM NETWORK STREAM";
				playAudio();
			}
		});

		document.getElementById('btn-next').addEventListener('click', () => {
			currentTrackIndex = (currentTrackIndex + 1) % internetPlaylist.length;
			loadInternetTrack(currentTrackIndex);
			audio.src = internetPlaylist[currentTrackIndex].url;
			playAudio();
		});

		document.getElementById('btn-prev').addEventListener('click', () => {
			currentTrackIndex = (currentTrackIndex - 1 + internetPlaylist.length) % internetPlaylist.length;
			loadInternetTrack(currentTrackIndex);
			audio.src = internetPlaylist[currentTrackIndex].url;
			playAudio();
		});

		fileInput.addEventListener('change', (e) => {
			const file = e.target.files[0];
			if (file) {
				trackTitle.textContent = file.name.toUpperCase();
				audio.src = URL.createObjectURL(file);
				playAudio();
			}
		});

		function playAudio() {
			if(audio.src) {
				statusText.textContent = "Connecting...";
				audio.play()
					.then(() => {
						statusText.textContent = "Playing";
						spinnerMesh.classList.add('spinning');
					})
					.catch(err => {
						statusText.textContent = "ERR: CORS/BLOCKED";
						spinnerMesh.classList.remove('spinning');
					});
			}
		}

		btnPlay.addEventListener('click', playAudio);
		btnPause.addEventListener('click', () => {
			audio.pause();
			statusText.textContent = "Paused";
			spinnerMesh.classList.remove('spinning');
		});
		btnStop.addEventListener('click', () => {
			audio.pause();
			audio.currentTime = 0;
			statusText.textContent = "Stopped";
			spinnerMesh.classList.remove('spinning');
		});

		volumeSlider.addEventListener('input', (e) => { audio.volume = e.target.value; });

		audio.addEventListener('timeupdate', () => {
			let mins = Math.floor(audio.currentTime / 60);
			let secs = Math.floor(audio.currentTime % 60);
			timeCount.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
		});
	</script>
</body>
</html>
